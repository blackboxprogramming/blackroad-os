name: Emoji Bot

on:
  workflow_dispatch:
  reaction:
    types:
      - created

permissions:
  contents: read
  issues: write
  pull-requests: write
  discussions: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run emoji bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EMOJI_BOT_DRY_RUN: "false"
        run: node bot/index.js
