name: 🧬 Spawn Runner – Lucidia Agent Dispatcher

on:
  workflow_dispatch:
    inputs:
      agent_name:
        description: "Agent name/identifier (e.g., guardian-clone-vault)"
        required: true
        type: string
      purpose:
        description: "Purpose of the spawned agent"
        required: true
        type: string
      summary:
        description: "Summary of why the agent was spawned"
        required: true
        type: string
      ttl:
        description: "Time-to-live for the agent (e.g., 96h)"
        required: false
        default: "96h"
        type: string
      awaiting_approval:
        description: "User to await approval from"
        required: false
        default: "alexa"
        type: string

jobs:
  spawn-agent:
    runs-on: ubuntu-latest
    steps:
      - name: 🧬 Checkout Repo
        uses: actions/checkout@v3

      - name: 🧠 Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🚀 Execute Spawn Runner
        id: spawn
        run: |
          echo "Spawning agent: ${{ inputs.agent_name }}"
          echo "Purpose: ${{ inputs.purpose }}"
          echo "Summary: ${{ inputs.summary }}"
          echo "TTL: ${{ inputs.ttl }}"
          echo "Awaiting approval from: @${{ inputs.awaiting_approval }}"

      - name: 📢 Notify Discord/Slack
        if: ${{ env.LUCIDIA_WEBHOOK != '' }}
        env:
          LUCIDIA_WEBHOOK: ${{ secrets.LUCIDIA_WEBHOOK }}
          PR_URL: ${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.number }}
          AGENT_NAME: ${{ inputs.agent_name }}
          PURPOSE: ${{ inputs.purpose }}
          SUMMARY: ${{ inputs.summary }}
          TTL: ${{ inputs.ttl }}
          AWAITING_APPROVAL: ${{ inputs.awaiting_approval }}
        run: |
          if [ -n "$LUCIDIA_WEBHOOK" ]; then
            MESSAGE="🚀 Lucidia has opened a new auto-generated PR:\n🔗 ${PR_URL}\n🧬 Agent: ${AGENT_NAME}\n📦 Purpose: ${PURPOSE}\n💬 Summary: ${SUMMARY}\n⏱️ TTL: ${TTL}\n👁️ Awaiting approval from @${AWAITING_APPROVAL}"
            
            curl -X POST \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"${MESSAGE}\", \"text\": \"${MESSAGE}\"}" \
              "$LUCIDIA_WEBHOOK"
            
            echo "✅ Notification sent to webhook"
          else
            echo "⚠️ LUCIDIA_WEBHOOK secret not configured - skipping notification"
          fi
