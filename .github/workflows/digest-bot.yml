name: 📊 Weekly Emoji Digest Bot

on:
  schedule:
    # Runs every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      digest_issue_number:
        description: "Issue number to post the digest comment (optional)"
        required: false
        type: number
      days_to_look_back:
        description: "Number of days to look back for reactions"
        required: false
        default: "7"
      post_comment:
        description: "Post digest as comment on tracking issue"
        required: false
        default: "true"

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    

    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@v4

      - name: 🧠 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📊 Run Digest Bot
        run: node bot/digest-bot.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          DAYS_TO_LOOK_BACK: ${{ github.event.inputs.days_to_look_back || '7' }}
          POST_COMMENT: ${{ github.event.inputs.post_comment || 'true' }}
          DIGEST_ISSUE_NUMBER: ${{ inputs.digest_issue_number || vars.DIGEST_ISSUE_NUMBER || '1' }}

      - name: 📤 Upload Digest Artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-digest
          path: digest.md
          retention-days: 30
