# project-config.yml
# Configuration for GitHub Projects integration

# Default project settings
default_project:
  # Organization and project number
  organization: "blackroad-os"
  project_number: 1
  
  # Node ID for GraphQL API (set after project creation)
  # project_id: "PVT_kwDOxxxxxx"

# Status field configuration
status_field:
  name: "Status"
  options:
    - id: "not_started"
      name: "Not Started"
      emoji: "⬜"
    - id: "in_progress"
      name: "In Progress"
      emoji: "🟡"
    - id: "done"
      name: "Done"
      emoji: "✅"
    - id: "blocked"
      name: "Blocked"
      emoji: "❌"
    - id: "needs_review"
      name: "Needs Review"
      emoji: "🤔"
    - id: "rework"
      name: "Rework"
      emoji: "🔁"
    - id: "escalation"
      name: "Escalation"
      emoji: "🛟"

# Custom fields for sprint tracking
custom_fields:
  - name: "Sprint"
    type: "iteration"
  - name: "Priority"
    type: "single_select"
    options:
      - "🔴 Critical"
      - "🟠 High"
      - "🟡 Medium"
      - "🟢 Low"
  - name: "Assigned Agent"
    type: "single_select"
    options:
      - "🤖 builder-agent"
      - "📝 scribe-agent"
      - "👁️ guardian-agent"
      - "📋 planner-agent"
      - "🧍‍♀️ Human"

# Automation rules
automation:
  # Auto-assign agent based on labels
  auto_assign:
    enabled: true
    rules:
      - label: "documentation"
        agent: "scribe-agent"
      - label: "bug"
        agent: "builder-agent"
      - label: "security"
        agent: "guardian-agent"
      - label: "planning"
        agent: "planner-agent"

  # Auto-status transitions
  status_transitions:
    enabled: true
    rules:
      - trigger: "pr_opened"
        from: "Not Started"
        to: "In Progress"
      - trigger: "review_requested"
        from: "In Progress"
        to: "Needs Review"
      - trigger: "pr_merged"
        from: "*"
        to: "Done"
      - trigger: "issue_closed"
        from: "*"
        to: "Done"

# Notification settings
notifications:
  # Slack integration (if configured)
  slack:
    enabled: false
    channel: "#blackroad-status"
  
  # Comment notifications
  comments:
    on_status_change: true
    on_escalation: true
    on_assignment: true

# Sprint tracking configuration
sprint:
  # Sprint duration in weeks
  duration_weeks: 2
  # Goal calculation
  velocity_tracking: true
  # Progress bar width
  progress_bar_width: 10
